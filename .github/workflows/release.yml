name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props', '**/Directory.Packages.props') }}

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build + package (unsigned)
        shell: pwsh
        run: .\build.ps1 -Build -Msi -Pkg

      - name: Collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          if (Test-Path dist) {
            Get-ChildItem dist -Recurse -File -Include *.msi,*.pkg,*.nupkg,*.exe,*.zip |
              ForEach-Object { Copy-Item $_.FullName "release/" -Force }
          }
          Get-ChildItem release | Format-Table Name, Length

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.version.outputs.version }}"
          $dotnet = (dotnet --version).Trim()
          $os = (Get-CimInstance Win32_OperatingSystem).Caption.Trim()
          $runUrl = "$env:GITHUB_SERVER_URL/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
          $title = "csharpDialog $version"

          $buildInfo = @"
          ## Build info

          Built with .NET SDK $dotnet on $os, via GitHub Actions: $runUrl. Provided **unsigned**.
          "@

          $signing = @"
          ## Signing for enterprise deployment

          ``````powershell
          signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /n "Your Certificate Name" dialog.exe
          ``````

          Built from commit ``$env:GITHUB_SHA``.
          "@

          $autoNotes = gh api -X POST "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" -f tag_name=$tag --jq .body
          $notes = "$buildInfo`n`n$autoNotes`n`n$signing"

          $artifacts = Get-ChildItem -Path release -File | ForEach-Object { $_.FullName }
          if ($artifacts.Count -eq 0) { throw 'No artifacts to upload' }
          gh release create $tag @artifacts --title $title --notes $notes
